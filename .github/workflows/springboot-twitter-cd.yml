name: CD - Build and Push Docker Image
on:
  push:
    branches: [ main ]
  jobs:
    springboot-twitter-cd:
      runs-on: ubuntu-24.04

      steps:
        - uses: actions/checkout@v4

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'gradle'
            cache-dependency-path: |
              **/*.gradle*
              **/gradle-wrapper.properties

        - name: Build with Gradle
          run: ./gradlew build -x test

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_HUB_USERNAME }}
            password: ${{ secrets.DOCKER_HUB_TOKEN }}

        - name: Build Docker image
          run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/springboot-twitterlinux:latest .

        - name: Push Docker image
          run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/springboot-twitter-linux:latest

